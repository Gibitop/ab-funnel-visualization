<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A/B Funnel Visualization</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #161411;
        --muted: #706b62;
        --paper: #f7f2e8;
        --panel: #fffaf0;
        --line: #d9cdb9;
        --a: #0d7f78;
        --b: #d04f2f;
        --shadow: 0 22px 80px rgba(44, 32, 17, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(22, 20, 17, 0.035) 1px, transparent 1px),
          linear-gradient(rgba(22, 20, 17, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 84% 9%, rgba(208, 79, 47, 0.13), transparent 28rem),
          radial-gradient(circle at 11% 18%, rgba(13, 127, 120, 0.12), transparent 26rem),
          var(--paper);
        background-size: 24px 24px, 24px 24px, auto, auto, auto;
        color: var(--ink);
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        width: min(1440px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      .rerun-button {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--ink);
        background: var(--panel);
        box-shadow: 4px 4px 0 var(--ink);
        cursor: pointer;
        font-family: "Arial Narrow", "Aptos Narrow", Impact, sans-serif;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
        transition:
          transform 150ms ease,
          box-shadow 150ms ease;
      }

      .rerun-button:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--ink);
      }

      .board {
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 22px;
      }

      .controls,
      .stage {
        border: 1px solid var(--line);
        background: rgba(255, 250, 240, 0.86);
        box-shadow: var(--shadow);
      }

      .controls {
        position: sticky;
        top: 18px;
        align-self: start;
        padding: 18px;
      }

      .control {
        padding: 14px 0;
        border-bottom: 1px solid var(--line);
      }

      .control:first-child {
        padding-top: 0;
      }

      .control:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .control label,
      .stage-title {
        font-family: "Arial Narrow", "Aptos Narrow", Impact, sans-serif;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .control label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        font-size: 18px;
      }

      .control span {
        color: var(--muted);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--a);
      }

      .main {
        display: grid;
        gap: 18px;
      }

      .stages {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .stage {
        min-height: 520px;
        padding: 16px;
        overflow: hidden;
      }

      .stage-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 12px;
        font-size: 24px;
      }

      .stage-title small {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 14px;
      }

      .counts {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .count-row {
        display: grid;
        grid-template-columns: 58px 1fr 56px;
        align-items: center;
        gap: 8px;
        min-height: 24px;
        font-size: 14px;
      }

      .bar {
        height: 12px;
        border: 1px solid var(--ink);
        background: rgba(22, 20, 17, 0.06);
      }

      .bar-fill {
        height: 100%;
      }

      .bar-fill.a {
        background: var(--a);
      }

      .bar-fill.b {
        background: var(--b);
      }

      .people-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(8px, 1fr));
        align-content: start;
        gap: 4px;
        min-height: 348px;
        padding: 12px;
        border: 1px solid var(--line);
        background:
          linear-gradient(rgba(255, 250, 240, 0.72), rgba(255, 250, 240, 0.72)),
          repeating-linear-gradient(135deg, transparent 0 10px, rgba(22, 20, 17, 0.035) 10px 11px);
      }

      .person {
        aspect-ratio: 1;
        min-width: 7px;
        border: 1px solid rgba(22, 20, 17, 0.5);
      }

      .person.step-a {
        background: var(--a);
      }

      .person.step-b {
        background: var(--b);
      }

      .person.variant-a {
        border-radius: 0;
      }

      .person.variant-b {
        border-radius: 50%;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .swatch {
        width: 12px;
        height: 12px;
        border: 1px solid var(--ink);
      }

      @media (max-width: 980px) {
        .board,
        .stages {
          grid-template-columns: 1fr;
        }

        .controls {
          position: static;
        }

        .stage {
          min-height: 0;
        }

        .people-grid {
          min-height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="board">
        <aside class="controls" aria-label="Simulation controls">
          <div class="control">
            <label for="population">Population <span id="populationValue">1000</span></label>
            <input id="population" type="range" min="100" max="2400" step="100" value="1000" />
          </div>
          <div class="control">
            <label for="step1ChanceA">Step 1 A split <span id="step1ChanceAValue">50%</span></label>
            <input id="step1ChanceA" type="range" min="0" max="100" value="50" />
          </div>
          <div class="control">
            <label for="step2ChanceA">Step 2 A split <span id="step2ChanceAValue">50%</span></label>
            <input id="step2ChanceA" type="range" min="0" max="100" value="50" />
          </div>
          <div class="control">
            <label for="passA">Step 1 A pass <span id="passAValue">90%</span></label>
            <input id="passA" type="range" min="0" max="100" value="90" />
          </div>
          <div class="control">
            <label for="passB">Step 1 B pass <span id="passBValue">20%</span></label>
            <input id="passB" type="range" min="0" max="100" value="20" />
          </div>
          <div class="control">
            <button class="rerun-button" id="rerun">Restart simulation</button>
          </div>
          <div class="legend">
            <span class="legend-item"><span class="swatch" style="background: var(--a)"></span>Step 1 variant A</span>
            <span class="legend-item"><span class="swatch" style="background: var(--b)"></span>Step 1 variant B</span>
            <span class="legend-item"><span class="swatch"></span>Step 2 variant A</span>
            <span class="legend-item"><span class="swatch" style="border-radius: 50%"></span>Step 2 variant B</span>
          </div>
        </aside>

        <section class="main">
          <section class="stages" aria-label="Simulation stages">
            <article class="stage">
              <div class="stage-title">Initial <small id="initialTotal">0 users</small></div>
              <div class="counts" id="initialCounts"></div>
              <div class="people-grid" id="initialGrid" aria-label="Initial people grid"></div>
            </article>
            <article class="stage">
              <div class="stage-title">Passed <small id="passedTotal">0 users</small></div>
              <div class="counts" id="passedCounts"></div>
              <div class="people-grid" id="passedGrid" aria-label="Passed people grid"></div>
            </article>
            <article class="stage">
              <div class="stage-title">Dropped <small id="droppedTotal">0 users</small></div>
              <div class="counts" id="droppedCounts"></div>
              <div class="people-grid" id="droppedGrid" aria-label="Dropped people grid"></div>
            </article>
          </section>
        </section>
      </section>
    </main>

    <script type="module">
      const controls = {
        population: document.querySelector("#population"),
        step1ChanceA: document.querySelector("#step1ChanceA"),
        step2ChanceA: document.querySelector("#step2ChanceA"),
        passA: document.querySelector("#passA"),
        passB: document.querySelector("#passB"),
      };

      const output = {
        populationValue: document.querySelector("#populationValue"),
        step1ChanceAValue: document.querySelector("#step1ChanceAValue"),
        step2ChanceAValue: document.querySelector("#step2ChanceAValue"),
        passAValue: document.querySelector("#passAValue"),
        passBValue: document.querySelector("#passBValue"),
        initialTotal: document.querySelector("#initialTotal"),
        passedTotal: document.querySelector("#passedTotal"),
        droppedTotal: document.querySelector("#droppedTotal"),
        initialCounts: document.querySelector("#initialCounts"),
        passedCounts: document.querySelector("#passedCounts"),
        droppedCounts: document.querySelector("#droppedCounts"),
        initialGrid: document.querySelector("#initialGrid"),
        passedGrid: document.querySelector("#passedGrid"),
        droppedGrid: document.querySelector("#droppedGrid"),
      };

      const percent = (value) => `${Math.round(value * 100)}%`;
      let seed = "42";

      const seededRandom = (seedText) => {
        let seed = 2166136261;
        for (const character of seedText) {
          seed ^= character.charCodeAt(0);
          seed = Math.imul(seed, 16777619);
        }
        return () => {
          seed += 0x6d2b79f5;
          let next = seed;
          next = Math.imul(next ^ (next >>> 15), next | 1);
          next ^= next + Math.imul(next ^ (next >>> 7), next | 61);
          return ((next ^ (next >>> 14)) >>> 0) / 4294967296;
        };
      };

      const summarize = (people) => ({
        step1A: people.filter((person) => person.step1 === "A").length,
        step1B: people.filter((person) => person.step1 === "B").length,
        step2A: people.filter((person) => person.step2 === "A").length,
        step2B: people.filter((person) => person.step2 === "B").length,
      });

      const renderCounts = (element, summary, total) => {
        const rows = [
          ["Step 1 A", summary.step1A, "a"],
          ["Step 1 B", summary.step1B, "b"],
          ["Step 2 A", summary.step2A, "a"],
          ["Step 2 B", summary.step2B, "b"],
        ];

        element.innerHTML = rows
          .map(([label, count, tone]) => {
            const width = total === 0 ? 0 : (count / total) * 100;
            return `
              <div class="count-row">
                <span>${label}</span>
                <div class="bar"><div class="bar-fill ${tone}" style="width: ${width}%"></div></div>
                <strong>${count}</strong>
              </div>
            `;
          })
          .join("");
      };

      const renderPeople = (element, people, dropped = false) => {
        const limit = 1200;
        element.innerHTML = people
          .slice(0, limit)
          .map((person) => `<span class="person step-${person.step1.toLowerCase()} variant-${person.step2.toLowerCase()}${dropped ? " dropped" : ""}" title="Step 1 ${person.step1}, Step 2 ${person.step2}"></span>`)
          .join("");
      };

      const run = () => {
        const population = Number(controls.population.value);
        const step1ChanceAOverB = Number(controls.step1ChanceA.value) / 100;
        const step2ChanceAOverB = Number(controls.step2ChanceA.value) / 100;
        const chanceToPassThroughStep1A = Number(controls.passA.value) / 100;
        const chanceToPassThroughStep1B = Number(controls.passB.value) / 100;
        const random = seededRandom(seed);
        const choose = (chance) => random() < chance;

        const people = Array(population)
          .fill(null)
          .map(() => ({
            step1: choose(step1ChanceAOverB) ? "A" : "B",
            step2: choose(step2ChanceAOverB) ? "A" : "B",
          }));

        const droppedOnStep1 = [];
        const goesToStep2 = [];
        for (const person of people) {
          if (person.step1 === "A") {
            if (choose(chanceToPassThroughStep1A)) {
              goesToStep2.push(person);
            } else {
              droppedOnStep1.push(person);
            }
          } else {
            if (choose(chanceToPassThroughStep1B)) {
              goesToStep2.push(person);
            } else {
              droppedOnStep1.push(person);
            }
          }
        }

        const initial = summarize(people);
        const passed = summarize(goesToStep2);
        const dropped = summarize(droppedOnStep1);

        output.populationValue.textContent = population;
        output.step1ChanceAValue.textContent = percent(step1ChanceAOverB);
        output.step2ChanceAValue.textContent = percent(step2ChanceAOverB);
        output.passAValue.textContent = percent(chanceToPassThroughStep1A);
        output.passBValue.textContent = percent(chanceToPassThroughStep1B);

        output.initialTotal.textContent = `${people.length} users`;
        output.passedTotal.textContent = `${goesToStep2.length} users`;
        output.droppedTotal.textContent = `${droppedOnStep1.length} users`;

        renderCounts(output.initialCounts, initial, people.length);
        renderCounts(output.passedCounts, passed, goesToStep2.length);
        renderCounts(output.droppedCounts, dropped, droppedOnStep1.length);
        renderPeople(output.initialGrid, people);
        renderPeople(output.passedGrid, goesToStep2);
        renderPeople(output.droppedGrid, droppedOnStep1, true);
      };

      for (const control of Object.values(controls)) {
        control.addEventListener("input", run);
      }

      document.querySelector("#rerun").addEventListener("click", () => {
        seed = String(Math.floor(Math.random() * 1_000_000));
        run();
      });

      run();
    </script>
  </body>
</html>
