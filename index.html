<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A/B Funnel Visualization</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #161411;
        --muted: #706b62;
        --paper: #f7f2e8;
        --panel: #fffaf0;
        --line: #d9cdb9;
        --a: #0d7f78;
        --b: #d04f2f;
        --shadow: 0 22px 80px rgba(44, 32, 17, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(22, 20, 17, 0.035) 1px, transparent 1px),
          linear-gradient(rgba(22, 20, 17, 0.035) 1px, transparent 1px),
          radial-gradient(
            circle at 84% 9%,
            rgba(208, 79, 47, 0.13),
            transparent 28rem
          ),
          radial-gradient(
            circle at 11% 18%,
            rgba(13, 127, 120, 0.12),
            transparent 26rem
          ),
          var(--paper);
        background-size:
          24px 24px,
          24px 24px,
          auto,
          auto,
          auto;
        color: var(--ink);
        font-family: sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        width: min(1440px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      .rerun-button {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--ink);
        background: var(--panel);
        box-shadow: 4px 4px 0 var(--ink);
        cursor: pointer;
        font-family: sans-serif;
        font-weight: 900;
        letter-spacing: 0;
        transition:
          transform 150ms ease,
          box-shadow 150ms ease;
      }

      .rerun-button:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--ink);
      }

      .board {
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 22px;
      }

      .controls,
      .stage {
        border: 1px solid var(--line);
        background: rgba(255, 250, 240, 0.86);
        box-shadow: var(--shadow);
      }

      .controls {
        position: sticky;
        top: 18px;
        align-self: start;
        padding: 18px;
      }

      .control {
        padding: 14px 0;
        border-bottom: 1px solid var(--line);
      }

      .control:first-child {
        padding-top: 0;
      }

      .control:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .control label,
      .stage-title {
        font-family: sans-serif;
        font-weight: 900;
        letter-spacing: 0;
        /* text-transform: uppercase; */
      }

      .control label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        font-size: 18px;
      }

      .control span {
        color: var(--muted);
      }

      .toggle {
        display: flex;
        justify-content: start !important;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .toggle input {
        width: 16px;
        height: 16px;
        accent-color: var(--a);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--a);
      }

      .main {
        display: grid;
        gap: 18px;
      }

      .stages {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .stage {
        min-height: 520px;
        padding: 16px;
        overflow: hidden;
      }

      .stage-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 12px;
        font-size: 24px;
      }

      .stage-title small {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 14px;
      }

      .counts {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .count-row {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr) max-content;
        align-items: center;
        gap: 14px;
        min-height: 24px;
        font-size: 14px;
      }

      .bar {
        height: 12px;
        border: 1px solid var(--ink);
        background: rgba(22, 20, 17, 0.06);
      }

      .count-row strong {
        min-width: 4ch;
        text-align: right;
      }

      .bar-fill {
        height: 100%;
      }

      .bar-fill.a {
        background: var(--a);
      }

      .bar-fill.b {
        background: var(--b);
      }

      .people-grid {
        display: block;
        width: 100%;
        height: 560px;
        min-height: 560px;
        border: 1px solid var(--line);
        background:
          linear-gradient(rgba(255, 250, 240, 0.72), rgba(255, 250, 240, 0.72)),
          repeating-linear-gradient(
            135deg,
            transparent 0 10px,
            rgba(22, 20, 17, 0.035) 10px 11px
          );
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .swatch {
        width: 12px;
        height: 12px;
        border: 1px solid var(--ink);
      }

      @media (max-width: 980px) {
        .board,
        .stages {
          grid-template-columns: 1fr;
        }

        .controls {
          position: static;
        }

        .stage {
          min-height: 0;
        }

        .people-grid {
          height: 360px;
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="board">
        <aside class="controls" aria-label="Simulation controls">
          <div class="control">
            <label for="population"
              >Population <span id="populationValue">1000</span></label
            >
            <input
              id="population"
              type="range"
              min="100"
              max="2400"
              step="100"
              value="1000"
            />
          </div>
          <div class="control">
            <label for="step1ChanceA"
              >Step 1 A split <span id="step1ChanceAValue">50%</span></label
            >
            <input
              id="step1ChanceA"
              type="range"
              min="0"
              max="100"
              value="50"
            />
          </div>
          <div class="control">
            <label for="step2ChanceA"
              >Step 2 A split <span id="step2ChanceAValue">50%</span></label
            >
            <input
              id="step2ChanceA"
              type="range"
              min="0"
              max="100"
              value="50"
            />
          </div>
          <div class="control">
            <label for="passA"
              >Step 1 A pass <span id="passAValue">90%</span></label
            >
            <input id="passA" type="range" min="0" max="100" value="90" />
          </div>
          <div class="control">
            <label for="passB"
              >Step 1 B pass <span id="passBValue">20%</span></label
            >
            <input id="passB" type="range" min="0" max="100" value="20" />
          </div>
          <div class="control">
            <label class="toggle" for="sortPeople">
              <input id="sortPeople" type="checkbox" />
              Sort visualization
            </label>
          </div>
          <div class="control">
            <button class="rerun-button" id="rerun">Restart simulation</button>
          </div>
          <div class="legend">
            <span class="legend-item"
              ><span class="swatch" style="background: var(--a)"></span>Step 1
              variant A</span
            >
            <span class="legend-item"
              ><span class="swatch" style="background: var(--b)"></span>Step 1
              variant B</span
            >
            <span class="legend-item"
              ><span class="swatch"></span>Step 2 variant A</span
            >
            <span class="legend-item"
              ><span class="swatch" style="border-radius: 50%"></span>Step 2
              variant B</span
            >
          </div>
        </aside>

        <section class="main">
          <section class="stages" aria-label="Simulation stages">
            <article class="stage">
              <div class="stage-title">
                Initial population <small id="initialTotal">0 users</small>
              </div>
              <div class="counts" id="initialCounts"></div>
              <canvas
                class="people-grid"
                id="initialGrid"
                aria-label="Initial people grid"
              ></canvas>
            </article>
            <article class="stage">
              <div class="stage-title">
                Passed after step 1 <small id="passedTotal">0 users</small>
              </div>
              <div class="counts" id="passedCounts"></div>
              <canvas
                class="people-grid"
                id="passedGrid"
                aria-label="Passed people grid"
              ></canvas>
            </article>
            <article class="stage">
              <div class="stage-title">
                Dropped after step 1 <small id="droppedTotal">0 users</small>
              </div>
              <div class="counts" id="droppedCounts"></div>
              <canvas
                class="people-grid"
                id="droppedGrid"
                aria-label="Dropped people grid"
              ></canvas>
            </article>
          </section>
        </section>
      </section>
    </main>

    <script type="module">
      const controls = {
        population: document.querySelector("#population"),
        step1ChanceA: document.querySelector("#step1ChanceA"),
        step2ChanceA: document.querySelector("#step2ChanceA"),
        passA: document.querySelector("#passA"),
        passB: document.querySelector("#passB"),
        sortPeople: document.querySelector("#sortPeople"),
      };

      const output = {
        populationValue: document.querySelector("#populationValue"),
        step1ChanceAValue: document.querySelector("#step1ChanceAValue"),
        step2ChanceAValue: document.querySelector("#step2ChanceAValue"),
        passAValue: document.querySelector("#passAValue"),
        passBValue: document.querySelector("#passBValue"),
        initialTotal: document.querySelector("#initialTotal"),
        passedTotal: document.querySelector("#passedTotal"),
        droppedTotal: document.querySelector("#droppedTotal"),
        initialCounts: document.querySelector("#initialCounts"),
        passedCounts: document.querySelector("#passedCounts"),
        droppedCounts: document.querySelector("#droppedCounts"),
        initialGrid: document.querySelector("#initialGrid"),
        passedGrid: document.querySelector("#passedGrid"),
        droppedGrid: document.querySelector("#droppedGrid"),
      };

      const percent = (value) => `${Math.round(value * 100)}%`;
      const canvases = [
        output.initialGrid,
        output.passedGrid,
        output.droppedGrid,
      ];
      let seed = "42";

      const seededRandom = (seedText) => {
        let seed = 2166136261;
        for (const character of seedText) {
          seed ^= character.charCodeAt(0);
          seed = Math.imul(seed, 16777619);
        }
        return () => {
          seed += 0x6d2b79f5;
          let next = seed;
          next = Math.imul(next ^ (next >>> 15), next | 1);
          next ^= next + Math.imul(next ^ (next >>> 7), next | 61);
          return ((next ^ (next >>> 14)) >>> 0) / 4294967296;
        };
      };

      const summarize = (people) => ({
        step1A: people.filter((person) => person.step1 === "A").length,
        step1B: people.filter((person) => person.step1 === "B").length,
        step2A: people.filter((person) => person.step2 === "A").length,
        step2B: people.filter((person) => person.step2 === "B").length,
      });

      const renderCounts = (element, summary, total) => {
        const rows = [
          ["Step 1 A", summary.step1A, "a"],
          ["Step 1 B", summary.step1B, "b"],
          ["Step 2 A", summary.step2A, "a"],
          ["Step 2 B", summary.step2B, "b"],
        ];

        element.innerHTML = rows
          .map(([label, count, tone]) => {
            const width = total === 0 ? 0 : (count / total) * 100;
            return `
              <div class="count-row">
                <span>${label}</span>
                <div class="bar"><div class="bar-fill ${tone}" style="width: ${width}%"></div></div>
                <strong>${count}</strong>
              </div>
            `;
          })
          .join("");
      };

      const renderPeople = (canvas, people, layoutCount, shouldSort) => {
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.floor(rect.width));
        const height = Math.max(1, Math.floor(rect.height));
        const scaledWidth = Math.floor(width * ratio);
        const scaledHeight = Math.floor(height * ratio);

        if (canvas.width !== scaledWidth || canvas.height !== scaledHeight) {
          canvas.width = scaledWidth;
          canvas.height = scaledHeight;
        }

        const context = canvas.getContext("2d");
        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        context.clearRect(0, 0, width, height);

        const padding = 12;
        const gap = 2;
        const innerWidth = width - padding * 2;
        const innerHeight = height - padding * 2;
        const columns = Math.max(
          1,
          Math.ceil(Math.sqrt((layoutCount * innerWidth) / innerHeight)),
        );
        const rows = Math.max(1, Math.ceil(layoutCount / columns));
        const cell = Math.max(
          2,
          Math.min(
            (innerWidth - gap * (columns - 1)) / columns,
            (innerHeight - gap * (rows - 1)) / rows,
          ),
        );
        const colors = {
          A: getComputedStyle(document.documentElement)
            .getPropertyValue("--a")
            .trim(),
          B: getComputedStyle(document.documentElement)
            .getPropertyValue("--b")
            .trim(),
        };

        context.strokeStyle = "rgba(22, 20, 17, 0.5)";
        context.lineWidth = Math.max(0.5, Math.min(1, cell / 8));

        const sortedPeople = shouldSort
          ? [...people].sort((left, right) => {
              if (left.step2 !== right.step2) {
                return left.step2.localeCompare(right.step2);
              }
              return left.step1.localeCompare(right.step1);
            })
          : people;

        for (let index = 0; index < sortedPeople.length; index += 1) {
          const person = sortedPeople[index];
          const x = padding + (index % columns) * (cell + gap);
          const y = padding + Math.floor(index / columns) * (cell + gap);

          context.fillStyle = colors[person.step1];
          context.beginPath();
          if (person.step2 === "B") {
            context.arc(x + cell / 2, y + cell / 2, cell / 2, 0, Math.PI * 2);
          } else {
            context.rect(x, y, cell, cell);
          }
          context.fill();
          context.stroke();
        }
      };

      const run = () => {
        const population = Number(controls.population.value);
        const step1ChanceAOverB = Number(controls.step1ChanceA.value) / 100;
        const step2ChanceAOverB = Number(controls.step2ChanceA.value) / 100;
        const chanceToPassThroughStep1A = Number(controls.passA.value) / 100;
        const chanceToPassThroughStep1B = Number(controls.passB.value) / 100;
        const shouldSortPeople = controls.sortPeople.checked;
        const random = seededRandom(seed);
        const choose = (chance) => random() < chance;

        const people = Array(population)
          .fill(null)
          .map(() => ({
            step1: choose(step1ChanceAOverB) ? "A" : "B",
            step2: choose(step2ChanceAOverB) ? "A" : "B",
          }));

        const droppedOnStep1 = [];
        const goesToStep2 = [];
        for (const person of people) {
          if (person.step1 === "A") {
            if (choose(chanceToPassThroughStep1A)) {
              goesToStep2.push(person);
            } else {
              droppedOnStep1.push(person);
            }
          } else {
            if (choose(chanceToPassThroughStep1B)) {
              goesToStep2.push(person);
            } else {
              droppedOnStep1.push(person);
            }
          }
        }

        const initial = summarize(people);
        const passed = summarize(goesToStep2);
        const dropped = summarize(droppedOnStep1);

        output.populationValue.textContent = population;
        output.step1ChanceAValue.textContent = percent(step1ChanceAOverB);
        output.step2ChanceAValue.textContent = percent(step2ChanceAOverB);
        output.passAValue.textContent = percent(chanceToPassThroughStep1A);
        output.passBValue.textContent = percent(chanceToPassThroughStep1B);

        output.initialTotal.textContent = `${people.length} users`;
        output.passedTotal.textContent = `${goesToStep2.length} users`;
        output.droppedTotal.textContent = `${droppedOnStep1.length} users`;

        renderCounts(output.initialCounts, initial, people.length);
        renderCounts(output.passedCounts, passed, goesToStep2.length);
        renderCounts(output.droppedCounts, dropped, droppedOnStep1.length);
        renderPeople(
          output.initialGrid,
          people,
          people.length,
          shouldSortPeople,
        );
        renderPeople(
          output.passedGrid,
          goesToStep2,
          people.length,
          shouldSortPeople,
        );
        renderPeople(
          output.droppedGrid,
          droppedOnStep1,
          people.length,
          shouldSortPeople,
        );
      };

      for (const control of Object.values(controls)) {
        control.addEventListener("input", run);
      }

      document.querySelector("#rerun").addEventListener("click", () => {
        seed = String(Math.floor(Math.random() * 1_000_000));
        run();
      });

      const resizeObserver = new ResizeObserver(run);
      for (const canvas of canvases) {
        resizeObserver.observe(canvas);
      }

      matchMedia(
        `(resolution: ${window.devicePixelRatio}dppx)`,
      ).addEventListener("change", run, { once: true });
      window.addEventListener("resize", run);

      run();
    </script>
  </body>
</html>
